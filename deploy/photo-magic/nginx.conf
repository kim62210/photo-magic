server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri.html $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Long-cache hashed assets
    location ~* \.(css|js|svg|woff2?|ttf|eot|otf|png|jpg|jpeg|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    server_tokens off;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
