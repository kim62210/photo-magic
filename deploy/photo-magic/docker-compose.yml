services:
  web:
    image: nginx:alpine
    container_name: photo-magic
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - infra_default
    labels:
      - "com.brian-dev.service=photo-magic"
      - "com.brian-dev.domain=photo-magic.brian-dev.cloud"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  infra_default:
    external: true
